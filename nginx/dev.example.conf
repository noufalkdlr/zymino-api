# 1. Define the backend server (Upstream)
upstream django_backend {
    server web:8000;
}

# 2. Development server configuration (HTTP only)
server {
    listen 80;

    # Using local network IP for testing on mobile/local devices
    server_name 192.168.31.117 localhost;

    # Allow larger file uploads for testing invoice attachments
    client_max_body_size 10M;

    # Increase timeouts for easier debugging of long-running tasks
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Access and Error logs for development debugging
    access_log /var/log/nginx/dev_access.log;
    error_log /var/log/nginx/dev_error.log;

    # Forward backend API requests to Gunicorn
    location / {
        proxy_pass http://django_backend;

        # Essential headers for passing cookies and identifying client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ensure cookies work across web and mobile platforms
        proxy_pass_header Set-Cookie;
    }

    # Static files for Django Admin and other assets
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files uploaded by users
    location /media/ {
        alias /app/media/;
    }
}
